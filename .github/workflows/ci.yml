name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:

  # 🔹 JOB 1 - BUILD
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Criar pasta build e copiar arquivos da src
        run: |
          mkdir build
          cp -r src/* build/

      - name: Upload artefato
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: build

  # 🔹 JOB 2 - DEPLOY
  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download artefato
        uses: actions/download-artifact@v4
        with:
          name: site
          path: build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4