name: Esteira Inquebrável

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:

  validar-html:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar htmlhint
        run: npm install -g htmlhint

      - name: Validar HTML
        run: htmlhint "**/*.html"

  validar-css:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar stylelint
        run: npm install -g stylelint stylelint-config-standard

      - name: Criar config do stylelint
        run: |
          echo '{
            "extends": "stylelint-config-standard"
          }' > .stylelintrc.json

      - name: Validar CSS
        run: stylelint "**/*.css"

  preparar-entrega:
    runs-on: ubuntu-latest

    needs: [validar-html, validar-css]

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Criar pasta dist
        run: |
          mkdir dist
          cp -r *.html dist/ || true
          cp -r CSS dist/ || true
          cp -r JS dist/ || true

      - name: Listar conteúdo da dist
        run: ls -R dist