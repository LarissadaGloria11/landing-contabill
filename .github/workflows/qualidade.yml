name: Esteira de Qualidade

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  verificar-estrutura:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2️⃣ Verificar pasta src
      - name: Verificar pasta src
        run: |
          if [ ! -d "src" ]; then
            echo "Erro: pasta src não encontrada!"
            exit 1
          fi

      # 3️⃣ Verificar arquivo CSS
      - name: Verificar arquivo CSS
        run: |
          if [ ! -f "src/css/style.css" ]; then
            echo "Erro: style.css não está em src/css/"
            exit 1
          fi

      # 4️⃣ Verificar footer com nome
      - name: Verificar presença de footer com nome
        run: |
          if ! grep -q "Larissa da Glória de Souza" src/index.html; then
            echo "Erro: Footer obrigatório com nome do aluno não encontrado!"
            exit 1
          fi

      # 5️⃣ Configurar Node.js para rodar HTMLHint
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # 6️⃣ Instalar HTMLHint e rodar lint
      - name: Instalar e rodar HTMLHint
        run: |
          npm install -g htmlhint
          htmlhint src/index.html

      # 7️⃣ Mensagem final de auditoria
      - name: Auditoria Final
        run: echo "O código da aluna Larissa da Glória de Souza foi auditado e está seguindo as boas práticas de qualidade."