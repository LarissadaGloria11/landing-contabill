name: Esteira de Qualidade

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  verificar-estrutura:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Verificar pasta src
        run: |
          if [ ! -d "src" ]; then
            echo "Erro: pasta src não encontrada!"
            exit 1
          fi

      - name: Verificar arquivo CSS
        run: |
          if [ ! -f "src/css/style.css" ]; then
            echo "Erro: style.css não está em src/css/"
            exit 1
          fi

      - name: Verificar presença de footer com nome
        run: |
          if ! grep -q "Larissa da Glória de Souza" src/index.html; then
            echo "Erro: Footer obrigatório com nome do aluno não encontrado!"
            exit 1
          fi

      - name: HTMLHint
        uses: htmlhint/htmlhint-action@v1
        with:
          files: "src/index.html"

      - name: Auditoria Final
        run: echo "O código da aluna Larissa da Glória de Souza foi auditado e está seguindo as boas práticas de qualidade."